<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>inert. — beyond the label</title>
<meta name="description" content="Scan any product. See what leaches. Purity scored out of 100." />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  @keyframes radar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes rise { 0% { transform: translateY(14px); opacity: 0; } 30% { opacity: 1; } 70% { opacity: 1; } 100% { transform: translateY(-16px); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .radar-sweep, .rise-chev { animation: none !important; opacity: 0.8 !important; transform: none !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback } = React;

const T = {
  bg: "#F4EFE2", panel: "#FBF7EC", ink: "#22302E", soft: "#7E8A85",
  teal: "#17A398", tealDeep: "#0E7C74", tealGlow: "rgba(23,163,152,0.45)",
  cherry: "#D8433F", cherryGlow: "rgba(216,67,63,0.45)",
  butter: "#D9A430", butterGlow: "rgba(217,164,48,0.45)",
  chrome: "conic-gradient(from 210deg, #C9CBC6, #FDFDFB 18%, #AEB2AD 38%, #F2F3EF 58%, #B8BBB6 78%, #C9CBC6)",
};
const display = "'Futura', 'Century Gothic', 'Avenir Next', 'Trebuchet MS', sans-serif";
const body = "'Avenir Next', 'Futura', 'Century Gothic', system-ui, sans-serif";
const raise = (r = 24) => ({
  background: `linear-gradient(150deg, #FFFEF8, ${T.panel} 55%, #F0EADA)`, borderRadius: r,
  boxShadow: "9px 9px 22px rgba(34,48,46,0.13), -6px -6px 16px rgba(255,255,255,0.95), inset 0 1.5px 0 rgba(255,255,255,0.95)",
  border: "1px solid rgba(255,255,255,0.65)",
});
const recess = (r = 14) => ({
  background: "linear-gradient(150deg, #E7E1D1, #F5F0E2)", borderRadius: r,
  boxShadow: "inset 3px 3px 8px rgba(34,48,46,0.14), inset -2px -2px 6px rgba(255,255,255,0.95)",
});
const scoreColor = (s) => (s == null ? T.soft : s >= 80 ? T.teal : s >= 50 ? T.butter : T.cherry);
const scoreGlow = (s) => (s == null ? "transparent" : s >= 80 ? T.tealGlow : s >= 50 ? T.butterGlow : T.cherryGlow);

function Starburst({ size = 60, color = T.teal, style }) {
  const cx = size / 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={style}>
      {Array.from({ length: 8 }).map((_, i) => {
        const a = (i / 8) * Math.PI * 2;
        const long = i % 2 === 0;
        const len = long ? cx - 3 : cx * 0.58;
        return (
          <g key={i}>
            <line x1={cx} y1={cx} x2={cx + Math.cos(a) * len} y2={cx + Math.sin(a) * len}
              stroke={color} strokeWidth={size * 0.035} strokeLinecap="round" />
            <circle cx={cx + Math.cos(a) * len} cy={cx + Math.sin(a) * len} r={size * 0.045} fill={color} />
          </g>
        );
      })}
      <circle cx={cx} cy={cx} r={size * 0.09} fill={color} />
    </svg>
  );
}

function Emblem({ size = 64 }) {
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", background: T.chrome,
      boxShadow: "5px 5px 12px rgba(34,48,46,0.2), -4px -4px 10px rgba(255,255,255,0.95)",
      display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ width: size * 0.76, height: size * 0.76, borderRadius: "50%", ...recess(999), display: "flex", alignItems: "center", justifyContent: "center" }}>
        <Starburst size={size * 0.5} />
      </div>
    </div>
  );
}

function Jewel({ color, glow, on = true, size = 12 }) {
  return (
    <span style={{ width: size, height: size, borderRadius: "50%", display: "inline-block",
      background: on ? `radial-gradient(circle at 34% 30%, #fff9, ${color} 55%, ${color})` : "radial-gradient(circle at 34% 30%, #fff8, #B9B4A6 60%)",
      boxShadow: on ? `0 0 10px ${glow}, inset 0 -1.5px 2px rgba(0,0,0,0.35), 0 1px 1px rgba(255,255,255,0.8)` : "inset 0 -1.5px 2px rgba(0,0,0,0.25)",
      border: "1px solid rgba(34,48,46,0.25)" }} />
  );
}

function Gauge({ score }) {
  const size = 244, r = 86, cx = size / 2;
  const pct = Math.max(0, Math.min(100, score));
  const col = scoreColor(score), glow = scoreGlow(score);
  const start = 0.75 * Math.PI, sweep = 1.5 * Math.PI;
  const needleA = start + (pct / 100) * sweep;
  const arc = (from, to, radius) => {
    const x1 = cx + Math.cos(from) * radius, y1 = cx + Math.sin(from) * radius;
    const x2 = cx + Math.cos(to) * radius, y2 = cx + Math.sin(to) * radius;
    const large = to - from > Math.PI ? 1 : 0;
    return `M ${x1} ${y1} A ${radius} ${radius} 0 ${large} 1 ${x2} ${y2}`;
  };
  return (
    <div style={{ position: "relative", width: size, height: size, margin: "0 auto" }}>
      <div style={{ position: "absolute", inset: 0, borderRadius: "50%", background: T.chrome,
        boxShadow: "10px 10px 24px rgba(34,48,46,0.18), -8px -8px 20px rgba(255,255,255,0.95)" }} />
      <div style={{ position: "absolute", inset: 13, borderRadius: "50%",
        background: "radial-gradient(circle at 38% 30%, #FFFDF4, #F1EBDA 70%)",
        boxShadow: "inset 4px 4px 10px rgba(34,48,46,0.14), inset -3px -3px 8px rgba(255,255,255,0.95)" }} />
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ position: "absolute", inset: 0 }}>
        {Array.from({ length: 31 }).map((_, i) => {
          const a = start + (i / 30) * sweep;
          const major = i % 5 === 0;
          const r1 = r + 13, r2 = r + (major ? 4 : 9);
          return (
            <line key={i} x1={cx + Math.cos(a) * r1} y1={cx + Math.sin(a) * r1}
              x2={cx + Math.cos(a) * r2} y2={cx + Math.sin(a) * r2}
              stroke={major ? "#8E978F" : "#C8C4B4"} strokeWidth={major ? 2.2 : 1.1} strokeLinecap="round" />
          );
        })}
        <path d={arc(start, start + sweep, r)} fill="none" stroke="#DCD6C4" strokeWidth="8" strokeLinecap="round" />
        <path d={arc(start, needleA, r)} fill="none" stroke={col} strokeWidth="8" strokeLinecap="round"
          style={{ filter: `drop-shadow(0 0 6px ${glow})` }} />
        <g style={{ transform: `rotate(${(needleA * 180) / Math.PI - 90}deg)`, transformOrigin: `${cx}px ${cx}px`, transition: "transform 900ms cubic-bezier(.3,1.3,.4,1)" }}>
          <line x1={cx} y1={cx + 14} x2={cx} y2={cx - r + 16} stroke={T.cherry} strokeWidth="3.5" strokeLinecap="round"
            style={{ filter: `drop-shadow(0 0 4px ${T.cherryGlow})` }} />
        </g>
        <circle cx={cx} cy={cx} r="11" fill="url(#hub)" stroke="#9AA09A" strokeWidth="1" />
        <defs>
          <radialGradient id="hub" cx="35%" cy="30%">
            <stop offset="0%" stopColor="#FFFFFF" />
            <stop offset="60%" stopColor="#C9CBC6" />
            <stop offset="100%" stopColor="#9AA09A" />
          </radialGradient>
        </defs>
      </svg>
      <div style={{ position: "absolute", inset: 13, borderRadius: "50%", pointerEvents: "none",
        background: "linear-gradient(150deg, rgba(255,255,255,0.6), rgba(255,255,255,0) 42%)" }} />
      <div style={{ position: "absolute", left: 0, right: 0, bottom: 40, textAlign: "center" }}>
        <div style={{ fontFamily: display, fontSize: 46, fontWeight: 700, letterSpacing: "-0.02em", color: col, lineHeight: 1, textShadow: `0 0 14px ${glow}` }}>
          {score}
        </div>
      </div>
    </div>
  );
}

function Btn({ children, onClick, primary, disabled, style }) {
  const [down, setDown] = useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onPointerDown={() => setDown(true)} onPointerUp={() => setDown(false)} onPointerLeave={() => setDown(false)}
      style={{
        fontFamily: display, padding: "15px 18px", borderRadius: 999, fontSize: 13.5, fontWeight: 700,
        letterSpacing: "0.08em", textTransform: "lowercase", cursor: disabled ? "default" : "pointer",
        border: "1px solid rgba(255,255,255,0.55)", color: primary ? "#FFFDF4" : T.ink,
        background: primary
          ? `linear-gradient(160deg, ${disabled ? "#93A5A0" : "#1FBFB2"}, ${disabled ? "#77877F" : T.tealDeep})`
          : "linear-gradient(150deg, #FFFEF8, #EFE9D8)",
        boxShadow: down
          ? "inset 3px 3px 8px rgba(34,48,46,0.24), inset -2px -2px 6px rgba(255,255,255,0.25)"
          : primary
            ? `5px 5px 14px rgba(34,48,46,0.2), -3px -3px 10px rgba(255,255,255,0.75), inset 0 1.5px 0 rgba(255,255,255,0.4), 0 0 18px ${disabled ? "transparent" : "rgba(23,163,152,0.3)"}`
            : "5px 5px 14px rgba(34,48,46,0.14), -4px -4px 10px rgba(255,255,255,0.9), inset 0 1.5px 0 rgba(255,255,255,0.95)",
        transform: down ? "translateY(1px)" : "none",
        transition: "box-shadow 120ms ease, transform 120ms ease", ...style,
      }}>
      {children}
    </button>
  );
}

const sev = {
  high: { label: "high", color: T.cherry, glow: T.cherryGlow },
  medium: { label: "med", color: T.butter, glow: T.butterGlow },
  low: { label: "low", color: T.soft, glow: "transparent" },
};

function Block({ label, children }) {
  return (
    <div style={{ marginTop: 20 }}>
      <div style={{ fontFamily: display, fontSize: 10.5, letterSpacing: "0.24em", color: T.soft, fontWeight: 800, textTransform: "lowercase", marginBottom: 11 }}>{label}</div>
      {children}
    </div>
  );
}

function Inert() {
  const [region, setRegion] = useState("UK");
  const [mode, setMode] = useState("photo");
  const [image, setImage] = useState(null);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [decoded, setDecoded] = useState(null);
  const fileRef = useRef(null);
  const camRef = useRef(null);
  const qrFileRef = useRef(null);
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const canvasRef = useRef(null);

  const stopCamera = useCallback(() => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    setScanning(false);
  }, []);
  useEffect(() => () => stopCamera(), [stopCamera]);

  // Compress photos so they fit serverless limits (max ~1280px, jpeg)
  const compressImage = (file) =>
    new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const maxDim = 1280;
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const c = document.createElement("canvas");
          c.width = Math.round(img.width * scale);
          c.height = Math.round(img.height * scale);
          c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
          const dataUrl = c.toDataURL("image/jpeg", 0.82);
          resolve({ data: dataUrl.split(",")[1], mediaType: "image/jpeg", preview: dataUrl });
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

  // Try to decode a 1D barcode (EAN/UPC) from a data URL using Quagga
  const decodeBarcodeStill = (dataUrl) =>
    new Promise((resolve) => {
      if (!window.Quagga) return resolve(null);
      window.Quagga.decodeSingle({
        src: dataUrl, numOfWorkers: 0, locate: true,
        inputStream: { size: 1280 },
        decoder: { readers: ["ean_reader", "ean_8_reader", "upc_reader", "upc_e_reader"] },
      }, (res) => resolve(res && res.codeResult ? res.codeResult.code : null));
    });

  // Look a barcode up in Open Food Facts (free community DB, UK & US coverage)
  const lookupBarcode = async (code) => {
    try {
      const r = await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`);
      const d = await r.json();
      if (d && d.status === 1 && d.product) {
        const p = d.product;
        return `Product database match for barcode ${code}: name: ${p.product_name || "unknown"}; brand: ${p.brands || "unknown"}; ingredients: ${p.ingredients_text || "not listed"}; packaging: ${p.packaging || "not listed"}; categories: ${p.categories || ""}`;
      }
    } catch (e) { console.warn("OFF lookup failed", e); }
    return null;
  };

  const handleCode = async (code) => {
    setDecoded(code);
    const isDigits = /^\d{8,14}$/.test(code);
    if (isDigits) {
      const info = await lookupBarcode(code);
      analyse({ text: info || `Barcode number ${code} (not found in product database)` });
    } else {
      analyse({ text: code });
    }
  };

  const analyse = async ({ text, img } = {}) => {
    setLoading(true); setError(null); setResult(null);
    try {
      const pic = img || image;
      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(text ? { region, text } : { region, image: { data: pic.data, mediaType: pic.mediaType } }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "API error");
      setResult(data);
    } catch (e) {
      console.error(e);
      setError("analysis failed — try again with a clearer photo or rescan the code.");
    } finally { setLoading(false); }
  };

  const startQR = async () => {
    setError(null); setResult(null); setDecoded(null);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      streamRef.current = stream;
      setScanning(true);
      const video = videoRef.current;
      video.srcObject = stream;
      await video.play();
      const canvas = canvasRef.current;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const detector = ("BarcodeDetector" in window)
        ? new window.BarcodeDetector({ formats: ["qr_code", "ean_13", "ean_8", "upc_a", "upc_e"] })
        : null;
      let busy = false, lastQuagga = 0;
      const tick = async () => {
        if (!streamRef.current) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA && !busy) {
          canvas.width = video.videoWidth; canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          if (detector) {
            busy = true;
            try {
              const codes = await detector.detect(canvas);
              if (codes && codes.length && codes[0].rawValue) { stopCamera(); handleCode(codes[0].rawValue); return; }
            } catch (e) {}
            busy = false;
          } else {
            const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = window.jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
            if (code && code.data) { stopCamera(); handleCode(code.data); return; }
            const now = Date.now();
            if (now - lastQuagga > 600) {
              lastQuagga = now; busy = true;
              const bar = await decodeBarcodeStill(canvas.toDataURL("image/jpeg", 0.7));
              busy = false;
              if (bar) { stopCamera(); handleCode(bar); return; }
            }
          }
        }
        rafRef.current = requestAnimationFrame(tick);
      };
      rafRef.current = requestAnimationFrame(tick);
    } catch (e) {
      console.error(e);
      stopCamera();
      setError("camera unavailable — allow camera access, or use snap the code instead.");
    }
  };

  const onFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setError(null); setResult(null); setDecoded(null);
    try { setImage(await compressImage(file)); }
    catch { setError("couldn't read that photo — try another."); }
  };

  const onQRFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setError(null); setResult(null); setDecoded(null);
    try {
      const compressed = await compressImage(file);
      // 1) try QR
      const img = new Image();
      img.onload = async () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        canvas.width = img.width; canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qr = window.jsQR(d.data, d.width, d.height);
        if (qr && qr.data) return handleCode(qr.data);
        // 2) try barcode
        const bar = await decodeBarcodeStill(compressed.preview);
        if (bar) return handleCode(bar);
        // 3) let the vision model read it
        setImage(compressed);
        analyse({ img: compressed });
      };
      img.src = compressed.preview;
    } catch {
      setError("couldn't read that image — try a closer, sharper shot of the code.");
    }
  };

  const reset = () => { stopCamera(); setImage(null); setResult(null); setError(null); setDecoded(null);
    [fileRef, camRef, qrFileRef].forEach(r => { if (r.current) r.current.value = ""; }); };

  return (
    <div style={{ minHeight: "100vh", color: T.ink, fontFamily: body,
      background: `radial-gradient(1100px 650px at 18% -8%, #FBF7EA, ${T.bg})` }}>
      <div style={{ maxWidth: 540, margin: "0 auto", padding: "26px 18px 56px", position: "relative" }}>
        <Starburst size={90} color="rgba(23,163,152,0.10)" style={{ position: "absolute", top: 90, right: -14 }} />
        <Starburst size={54} color="rgba(216,67,63,0.09)" style={{ position: "absolute", top: 300, left: -8 }} />

        <header style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 26, position: "relative" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 13 }}>
            <Emblem size={48} />
            <div>
              <div style={{ fontFamily: display, fontSize: 26, fontWeight: 700, letterSpacing: "0.02em", lineHeight: 1 }}>
                inert<span style={{ color: T.teal, textShadow: `0 0 10px ${T.tealGlow}` }}>.</span>
              </div>
              <div style={{ fontFamily: display, fontSize: 11, color: T.soft, marginTop: 4, fontWeight: 600, letterSpacing: "0.18em" }}>
                beyond the label
              </div>
            </div>
          </div>
          <div style={{ ...recess(999), padding: 4, display: "flex", position: "relative", width: 108 }}>
            <div style={{ position: "absolute", top: 4, bottom: 4, width: 50, borderRadius: 999,
              left: region === "UK" ? 4 : 54,
              background: "linear-gradient(150deg, #FFFEF8, #EDE7D6)",
              boxShadow: "2px 2px 6px rgba(34,48,46,0.2), inset 0 1.5px 0 rgba(255,255,255,0.95)",
              transition: "left 220ms cubic-bezier(.4,1.4,.6,1)" }} />
            {["UK", "US"].map(r => (
              <button key={r} onClick={() => setRegion(r)} style={{
                flex: 1, position: "relative", zIndex: 1, border: "none", background: "transparent",
                padding: "7px 0", fontFamily: display, fontSize: 12, fontWeight: 700, letterSpacing: "0.08em",
                cursor: "pointer", color: region === r ? T.ink : T.soft, transition: "color 200ms" }}>{r}</button>
            ))}
          </div>
        </header>

        {!result && (
          <React.Fragment>
            <div style={{ ...recess(999), padding: 5, display: "flex", position: "relative", marginBottom: 18 }}>
              <div style={{ position: "absolute", top: 5, bottom: 5, width: "calc(50% - 7px)", borderRadius: 999,
                left: mode === "photo" ? 5 : "calc(50% + 2px)",
                background: "linear-gradient(150deg, #FFFEF8, #EDE7D6)",
                boxShadow: "3px 3px 8px rgba(34,48,46,0.2), inset 0 1.5px 0 rgba(255,255,255,0.95)",
                transition: "left 220ms cubic-bezier(.4,1.4,.6,1)" }} />
              {[["photo", "UPLOAD"], ["qr", "QR"]].map(([m, label]) => (
                <button key={m} onClick={() => { if (m === "photo") stopCamera(); setMode(m); setError(null); if (m === "qr") setImage(null); }}
                  style={{ flex: 1, position: "relative", zIndex: 1, border: "none", background: "transparent",
                    padding: "12px 0", fontFamily: display, fontSize: 13, fontWeight: 700, letterSpacing: "0.1em",
                    cursor: "pointer", color: mode === m ? T.ink : T.soft, transition: "color 200ms" }}>{label}</button>
              ))}
            </div>

            <div style={{ ...raise(28), padding: 20, position: "relative" }}>
              <div style={{ position: "absolute", top: 0, left: 28, right: 28, height: 4, borderRadius: "0 0 4px 4px", background: T.chrome, boxShadow: "0 1px 2px rgba(34,48,46,0.2)" }} />

              {mode === "photo" ? (
                <React.Fragment>
                  {image ? (
                    <div style={{ ...recess(18), padding: 8 }}>
                      <img src={image.preview} alt="Product" style={{ width: "100%", maxHeight: 290, objectFit: "contain", borderRadius: 12, display: "block" }} />
                    </div>
                  ) : (
                    <div style={{ padding: "32px 12px", textAlign: "center" }}>
                      <div style={{ display: "flex", justifyContent: "center", marginBottom: 18 }}>
                        <div style={{ position: "relative", width: 96, height: 96, borderRadius: "50%", ...recess(999),
                          overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}>
                          {[0, 1, 2].map((i) => (
                            <svg key={i} className="rise-chev" width="34" height="18" viewBox="0 0 34 18"
                              style={{ position: "absolute", animation: `rise 1.8s ${i * 0.6}s cubic-bezier(.3,.6,.4,1) infinite`,
                                filter: `drop-shadow(0 0 5px ${T.tealGlow})` }}>
                              <path d="M3 15 L17 4 L31 15" fill="none" stroke={T.teal} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" />
                            </svg>
                          ))}
                          <div style={{ position: "absolute", inset: 0, borderRadius: "50%", pointerEvents: "none",
                            background: "linear-gradient(150deg, rgba(255,255,255,0.55), transparent 45%)" }} />
                        </div>
                      </div>
                      <div style={{ fontFamily: display, fontSize: 17, fontWeight: 700, letterSpacing: "0.12em" }}>POINT AT ANYTHING</div>
                      <div style={{ fontSize: 13.5, color: T.soft, marginTop: 8, lineHeight: 1.6, maxWidth: 320, marginInline: "auto" }}>
                        cookware, containers, utensils, glass, food or its label — barcodes included.
                      </div>
                    </div>
                  )}
                  <input ref={camRef} type="file" accept="image/*" capture="environment" onChange={onFile} style={{ display: "none" }} />
                  <input ref={fileRef} type="file" accept="image/*" onChange={onFile} style={{ display: "none" }} />
                  <div style={{ display: "flex", gap: 12, marginTop: 18 }}>
                    {!image ? (
                      <React.Fragment>
                        <Btn onClick={() => camRef.current?.click()} style={{ flex: 1 }}>take photo</Btn>
                        <Btn onClick={() => fileRef.current?.click()} style={{ flex: 1 }}>photo library</Btn>
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        <Btn onClick={() => fileRef.current?.click()} style={{ flex: 1 }}>change</Btn>
                        <Btn primary onClick={() => analyse({})} disabled={loading} style={{ flex: 1.35 }}>
                          {loading ? "analysing…" : "analyse"}
                        </Btn>
                      </React.Fragment>
                    )}
                  </div>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <div style={{ position: "relative", borderRadius: 20, overflow: "hidden", aspectRatio: "4/3",
                    background: "radial-gradient(120% 120% at 32% 22%, #12332F, #07120F 75%)",
                    boxShadow: "inset 4px 4px 12px rgba(0,0,0,0.65), inset -2px -2px 8px rgba(255,255,255,0.05), 6px 6px 16px rgba(34,48,46,0.18)",
                    border: "1px solid rgba(255,255,255,0.08)" }}>
                    <video ref={videoRef} playsInline muted style={{ width: "100%", height: "100%", objectFit: "cover", display: scanning ? "block" : "none" }} />
                    {!scanning && (
                      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12 }}>
                        <div style={{ position: "relative", width: 110, height: 110 }}>
                          {[100, 68, 36].map((d) => (
                            <div key={d} style={{ position: "absolute", inset: (110 - d) / 2, borderRadius: "50%", border: "1px solid rgba(23,163,152,0.35)" }} />
                          ))}
                          <div className="radar-sweep" style={{ position: "absolute", inset: 5, borderRadius: "50%",
                            background: "conic-gradient(from 0deg, rgba(23,163,152,0.5), transparent 70deg)",
                            animation: "radar 3s linear infinite" }} />
                          <div style={{ position: "absolute", inset: "calc(50% - 3px)", width: 6, height: 6, borderRadius: "50%", background: T.teal, boxShadow: `0 0 10px ${T.tealGlow}` }} />
                        </div>
                        <div style={{ color: "#7BB8AE", fontSize: 13, letterSpacing: "0.08em", fontFamily: display, fontWeight: 600 }}>
                          scanner on standby · barcodes + qr
                        </div>
                      </div>
                    )}
                    {scanning && (
                      <div style={{ position: "absolute", inset: "16%", borderRadius: 18, border: "2px solid rgba(255,255,255,0.9)", boxShadow: `0 0 0 999px rgba(0,0,0,0.32), 0 0 20px ${T.tealGlow}` }} />
                    )}
                    <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: "linear-gradient(150deg, rgba(255,255,255,0.13), transparent 42%)" }} />
                  </div>
                  <canvas ref={canvasRef} style={{ display: "none" }} />
                  <input ref={qrFileRef} type="file" accept="image/*" capture="environment" onChange={onQRFile} style={{ display: "none" }} />
                  <div style={{ display: "flex", gap: 12, marginTop: 18 }}>
                    <Btn primary={!scanning} onClick={scanning ? stopCamera : startQR} style={{ flex: 1.2 }}>
                      {scanning ? "stop scanner" : "start scanner"}
                    </Btn>
                    <Btn onClick={() => qrFileRef.current?.click()} disabled={loading} style={{ flex: 1 }}>
                      snap the code
                    </Btn>
                  </div>
                  <div style={{ fontSize: 12, color: T.soft, marginTop: 11, textAlign: "center" }}>
                    reads product barcodes and qr codes, matched against the open food facts database. scanner blocked? "snap the code" works from a photo.
                  </div>
                </React.Fragment>
              )}

              {loading && mode === "qr" && (
                <div style={{ marginTop: 14, fontSize: 12.5, color: T.soft, textAlign: "center" }}>
                  code captured{decoded ? ` · ${decoded.slice(0, 40)}${decoded.length > 40 ? "…" : ""}` : ""} — analysing…
                </div>
              )}
              {error && (
                <div style={{ ...recess(18), marginTop: 16, padding: "15px 17px", display: "flex", gap: 14, alignItems: "center" }}>
                  <div style={{ flexShrink: 0, width: 40, height: 40, borderRadius: "50%", background: T.chrome,
                    boxShadow: "3px 3px 8px rgba(34,48,46,0.2), -2px -2px 6px rgba(255,255,255,0.9)",
                    display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ width: 20, height: 20, borderRadius: "50%",
                      background: `radial-gradient(circle at 34% 30%, #ffd7d3, ${T.cherry} 55%)`,
                      boxShadow: `0 0 14px ${T.cherryGlow}, inset 0 -2px 3px rgba(0,0,0,0.35), 0 1px 1px rgba(255,255,255,0.8)`,
                      border: "1px solid rgba(34,48,46,0.3)" }} />
                  </div>
                  <div>
                    <div style={{ fontFamily: display, fontSize: 11, fontWeight: 800, letterSpacing: "0.24em", color: T.cherry, textShadow: `0 0 8px ${T.cherryGlow}`, marginBottom: 4 }}>
                      MALFUNCTION
                    </div>
                    <div style={{ fontSize: 13, color: T.ink, lineHeight: 1.55 }}>{error}</div>
                  </div>
                </div>
              )}
            </div>
          </React.Fragment>
        )}

        {result && (
          <div style={{ ...raise(28), overflow: "hidden", position: "relative" }}>
            <div style={{ position: "absolute", top: 0, left: 28, right: 28, height: 4, borderRadius: "0 0 4px 4px", background: T.chrome, boxShadow: "0 1px 2px rgba(34,48,46,0.2)" }} />
            <div style={{ padding: "30px 22px 8px", textAlign: "center" }}>
              <div style={{ fontFamily: display, fontSize: 10.5, letterSpacing: "0.26em", color: T.soft, fontWeight: 700, textTransform: "lowercase" }}>
                {(result.category || "product").toLowerCase()} · {region.toLowerCase()}
              </div>
              <h2 style={{ fontFamily: display, fontSize: 22, fontWeight: 700, letterSpacing: "0.01em", margin: "9px 0 24px" }}>{result.name}</h2>
              {result.score != null && <Gauge score={result.score} />}
              {result.verdict && (
                <div style={{ ...recess(999), display: "inline-flex", alignItems: "center", gap: 16, marginTop: 22, padding: "10px 22px" }}>
                  {[["PURE", T.teal, T.tealGlow], ["CAUTION", T.butter, T.butterGlow], ["AVOID", T.cherry, T.cherryGlow]].map(([v, c, g]) => (
                    <span key={v} style={{ display: "inline-flex", alignItems: "center", gap: 7 }}>
                      <Jewel color={c} glow={g} on={result.verdict === v} size={11} />
                      <span style={{ fontFamily: display, fontSize: 10.5, fontWeight: 800, letterSpacing: "0.14em",
                        color: result.verdict === v ? c : "#B4AE9E",
                        textShadow: result.verdict === v ? `0 0 8px ${g}` : "none" }}>{v.toLowerCase()}</span>
                    </span>
                  ))}
                </div>
              )}
            </div>

            <div style={{ padding: "10px 22px 24px" }}>
              <p style={{ fontSize: 14.5, lineHeight: 1.65, textAlign: "center", margin: "14px 0 20px" }}>{result.summary}</p>

              {result.materials?.length > 0 && (
                <Block label="composition">
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 9 }}>
                    {result.materials.map((m, i) => (
                      <span key={i} style={{ ...recess(999), padding: "7px 15px", fontSize: 13, fontWeight: 600 }}>{m}</span>
                    ))}
                  </div>
                </Block>
              )}

              <Block label="detected hazards">
                {result.hazards?.length ? result.hazards.map((h, i) => {
                  const s = sev[h.severity] || sev.low;
                  return (
                    <div key={i} style={{ ...recess(16), padding: "13px 15px", marginBottom: 10 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                        <strong style={{ fontSize: 14 }}>{h.name}</strong>
                        <span style={{ display: "inline-flex", alignItems: "center", gap: 7, whiteSpace: "nowrap" }}>
                          <Jewel color={s.color} glow={s.glow} size={10} />
                          <span style={{ fontFamily: display, fontSize: 10.5, fontWeight: 800, letterSpacing: "0.14em", color: s.color }}>{s.label}</span>
                        </span>
                      </div>
                      <div style={{ fontSize: 13, color: T.soft, marginTop: 5, lineHeight: 1.55 }}>{h.detail}</div>
                    </div>
                  );
                }) : (
                  <div style={{ display: "flex", alignItems: "center", gap: 9, fontSize: 14, color: T.tealDeep, fontWeight: 700 }}>
                    <Jewel color={T.teal} glow={T.tealGlow} size={11} /> nothing detected — clean.
                  </div>
                )}
              </Block>

              {result.goodParts?.length > 0 && (
                <Block label="what's natural here">
                  {result.goodParts.map((g, i) => (
                    <div key={i} style={{ fontSize: 13.5, lineHeight: 1.8, color: T.tealDeep, fontWeight: 600 }}>✦ {g}</div>
                  ))}
                </Block>
              )}

              {result.swap && (
                <div style={{ marginTop: 20, borderRadius: 20, padding: "16px 18px", color: "#EFF7F0", position: "relative", overflow: "hidden",
                  background: "linear-gradient(160deg, #14403A, #0A211D)",
                  boxShadow: "6px 6px 16px rgba(34,48,46,0.25), inset 0 1.5px 0 rgba(255,255,255,0.08)" }}>
                  <Starburst size={70} color="rgba(23,163,152,0.18)" style={{ position: "absolute", right: -12, top: -12 }} />
                  <div style={{ fontFamily: display, fontSize: 10, letterSpacing: "0.26em", color: "#6FD8C4", fontWeight: 800, marginBottom: 7, textShadow: `0 0 8px ${T.tealGlow}` }}>the swap</div>
                  <div style={{ fontSize: 14, lineHeight: 1.55 }}>{result.swap}</div>
                </div>
              )}

              <Btn onClick={reset} style={{ width: "100%", marginTop: 22 }}>scan another</Btn>
            </div>
          </div>
        )}

        <footer style={{ textAlign: "center", marginTop: 24, fontSize: 11.5, color: T.soft, lineHeight: 1.6 }}>
          inert. gives a naturalist's opinion — not medical or food-safety advice.
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Inert />);
</script>
</body>
</html>
